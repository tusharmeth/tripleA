server.port=8080
springdoc.swagger-ui.path=/swagger/index.html
springdoc.api-docs.path=/swagger/v3/api-docs

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ledger}
spring.datasource.username=${DB_USER:ledger}
spring.datasource.password=${DB_PASSWORD:ledger}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
